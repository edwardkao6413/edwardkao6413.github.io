# _data/career.yml
# Each entry is one event bar on the career timeline.
#
# Fields:
#   start_year:       integer — start year  (e.g. 2021)
#   start_month:      integer 1–12 — start month (e.g. 9 for September)
#   end_year:         integer — end year  (omit or ignored when present: true)
#   end_month:        integer 1–12 — end month (omit or ignored when present: true)
#   present:          true — if omitted or false, end_year/end_month are used
#   category:         work | research | education | amateur
#   label:            string — displayed on line 1 of the label (required)
#   description:      string (optional) — displayed on line 2 of the label, smaller and muted
#   leader_anchor:    "top" | omit — "top" pins leader line to bar top; default (omit) anchors at bar midpoint
#   leader_y_offset:  integer px — nudge from the anchor point (0 = exact anchor; positive = push down; negative = push up)
#   url:              string (optional) — makes the label a clickable link (opens in new tab)
#
# VALIDATION RULES (no runtime enforcement — check by hand):
#   - All month fields must be bare integers 1–12 (no quotes, no leading zeros)
#   - For non-present entries: end must be chronologically >= start
#   - present: true overrides end_year/end_month with the build-time current date
#   - category determines which parallel lane the bar appears in (no layer field needed)
#
# ADDING EVENTS — follow CLAUDE.md mandatory procedure:
#   1. Add entry with leader_y_offset: 0
#   2. Compute bar_top and check for clashes (within 28px, same label column)
#   3. Resolve clashes with leader_y_offset
#   4. Leader line anchors at bar midpoint by default — no correction needed for short bars
#
# Example:
# - start_year: 2021
#   start_month: 9
#   end_year: 2022
#   end_month: 6
#   category: work
#   label: "Job Title — Organisation Name"
#   description: "Optional subtitle or detail"
#   leader_y_offset: 0

