---
layout: default
title: Home
---

<!-- Hero Banner -->
<section class="hero">
  <div class="hero__bg" id="heroBg"></div>
  <div class="hero__content">
    <div class="profile-photo-wrapper">
      <a href="{{ '/' | relative_url }}" id="profileLink">
        <img
          class="profile-photo"
          src="{{ '/assets/img/profile.jpg' | relative_url }}"
          alt="Edward Kao"
          onerror="this.style.display='none'; document.getElementById('profileLink').style.display='none';"
        />
      </a>
    </div>
    <h1>Hi, I'm Edward.</h1>
    <p>Data Scientist &amp; Bioinformatics Researcher</p>
  </div>
  <span class="hero__photo-credit" id="photoCredit"></span>
</section>

<!-- Animated Keyword Section -->
<section class="main-content">
  <p class="animated-heading">
    I think about <strong><span id="animated-keyword"></span></strong><span class="cursor"></span>
  </p>
</section>
