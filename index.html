<section class="hero">

  <div class="hero__content">

      <a href="{{ '/' | relative_url }}" id="profileLink">
        <img
          class="profile-photo"
          src="{{ '/assets/img/profile.jpg' | relative_url }}"
          alt="Edward Kao"
          onerror="this.style.display='none'; document.getElementById('profileLink').style.display='none';"
        />

    <h1>Hi, I'm Edward.</h1>
    <p>Data Scientist &amp; Bioinformatics Researcher</p>
  </div>

</section>
